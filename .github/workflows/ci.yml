# CI — kamori (OSS)
#
# Runs on every push to main and on every pull request targeting main.
# Path filters ensure the pipeline only triggers when relevant files change,
# preventing unnecessary runs when only docs or demo apps are edited.
#
# Jobs (in dependency order):
#   typecheck  → fast tsc gate, runs in parallel with SDK jobs
#   typescript → build all TS packages + vitest with coverage enforcement
#   go         → go test + go vet for the Go SDK
#   python     → pytest for the Python SDK
#   php        → PHPUnit for the PHP SDK

name: CI

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "sdks/**"
      - "package*.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "sdks/**"
      - "package*.json"
      - "tsconfig.json"
      - "vitest.config.ts"

# Cancel any in-progress run for the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Type check
  #    Runs tsc --noEmit per package so type errors surface in <30 s without
  #    waiting for a full build + test cycle. Runs in parallel with the SDK
  #    jobs; the `typescript` build job gates on it.
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Each package has its own tsconfig.json. Running --noEmit skips
      # emitting JS so this step only validates types (fast).
      - name: Type check — core
        run: npx tsc --noEmit --project packages/core/tsconfig.json

      - name: Type check — ingest
        run: npx tsc --noEmit --project packages/ingest/tsconfig.json

      - name: Type check — mcp
        run: npx tsc --noEmit --project packages/mcp/tsconfig.json

      - name: Type check — sdk
        run: npx tsc --noEmit --project packages/sdk/tsconfig.json

  # ---------------------------------------------------------------------------
  # 2. TypeScript — build & test (with coverage)
  #    Builds all TS packages in dependency order (core → ingest, mcp, sdk),
  #    then runs vitest with coverage. Thresholds are enforced in
  #    vitest.config.ts: 80% lines/functions/statements, 70% branches.
  #    A failed threshold fails the job and blocks the PR.
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript — build & test
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # `npm run build` invokes `tsc -p .` for each workspace package.
      # Build order is managed by npm workspaces hoisting + package deps.
      - name: Build all packages
        run: npm run build

      # --coverage activates the v8 provider and enforces the thresholds
      # defined in vitest.config.ts. Reports are written to coverage/ as
      # lcov + html for the artifact upload below.
      - name: Run tests with coverage
        run: npx vitest run --coverage

      # Retain coverage HTML/lcov for 7 days so PRs can be inspected.
      # The artifact appears in the Actions summary under "Artifacts".
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-oss
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Go SDK
  #    `go test ./...` runs all tests under sdks/go/.
  #    `go vet ./...` runs the built-in static analyser (catches printf
  #    mismatches, unreachable code, etc.) at zero extra cost.
  # ---------------------------------------------------------------------------
  go:
    name: Go SDK — test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # Cache keyed on go.sum for reproducible, fast module resolution.
          cache-dependency-path: sdks/go/go.sum

      - name: Test
        working-directory: sdks/go
        run: go test ./...

      - name: Vet
        working-directory: sdks/go
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # 4. Python SDK
  #    Editable install (`pip install -e`) makes kamori_sdk importable without
  #    a separate build step. The [dev] extra resolves to pytest.
  # ---------------------------------------------------------------------------
  python:
    name: Python SDK — test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sdks/python/pyproject.toml

      - name: Install package
        working-directory: sdks/python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: sdks/python
        run: python -m pytest

  # ---------------------------------------------------------------------------
  # 5. PHP SDK
  #    Composer installs PHPUnit 10 and autoloads src/ via PSR-4.
  #    `coverage: none` skips Xdebug/pcov setup — PHP coverage is not
  #    collected in CI to keep the job fast.
  # ---------------------------------------------------------------------------
  php:
    name: PHP SDK — test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        working-directory: sdks/php
        run: composer install --no-progress --prefer-dist

      - name: Run tests
        working-directory: sdks/php
        run: vendor/bin/phpunit
